# Install this drop-in at
# /etc/systemd/system/datadog-agent.service.d/liveprocesses.conf when
# process_config.process_collection.enabled is true. CAP_SYS_PTRACE lets the
# agent read /proc/<pid>/io and /proc/<pid>/fd of processes owned by other
# users, which Live Processes needs for full fidelity. setup.sh installs it for
# you when run with PROCESS=1.
[Service]
AmbientCapabilities=CAP_SYS_PTRACE
CapabilityBoundingSet=CAP_SYS_PTRACE
